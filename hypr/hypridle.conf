general {
	lock_cmd = pidof hyprlock || $HOME/.config/scripts/convenience/hyprlockWall.sh
}

listener {
    timeout = 500
    on-timeout = pidof hyprlock || $HOME/.config/scripts/convenience/hyprlockWall.sh
    # on-resume = notify-send "Welcome Soilder"  
}

listener {
    timeout = 330                                                     # 5.5min
    on-timeout = hyprctl dispatch dpms off                            # screen off when timeout has passed
    on-resume = hyprctl dispatch dpms on && brightnessctl -r          # screen on when activity is detected after timeout has fired.
}

